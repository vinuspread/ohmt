  <text x="120" y="3550" font-family="Serif" font-size="48" font-style="italic" fill="white" letter-spacing="0.2em">GENIE</text>
  <text x="120" y="3620" font-family="Sans-serif" font-size="14" font-weight="light" fill="white" fill-opacity="0.4">
