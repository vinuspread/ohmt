    <tspan x="120" dy="1.6em">Nano Banana Edition for the refined few.</tspan>
  </text>
  
  <text x="840" y="3550" font-family="Sans-serif" font-size="10" font-weight="bold" letter-spacing="0.3em" fill="white" fill-opacity="0.6">NAVIGATION</text>
  <text x="840" y="3600" font-family="Sans-serif" font-size="14" fill="white" fill-opacity="0.4">
